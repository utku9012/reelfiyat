name: Build and Push to ECR

on:
  push:
    branches: [ "main" ] # Sadece main branch'ine push yapıldığında çalışır

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: reelfiyat-app # Terraform'da verdiğin isimle aynı olmalı
        IMAGE_TAG: latest # Veya ${{ github.sha }} ile her sürümü tekilleştirebilirsin
        working-directory: utku9012/reelfiyat/reelfiyat-main
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # ECR'a login ol
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 451620995684.dkr.ecr.eu-central-1.amazonaws.com
          # Eski konteyneri durdur ve sil (varsa)
          docker stop reelfiyat-container || true
          docker rm reelfiyat-container || true
          # Yeni imajı çek
          docker pull 451620995684.dkr.ecr.eu-central-1.amazonaws.com/reelfiyat-app:latest
          # Yeni konteyneri ayağa kaldır
          docker run -d --name reelfiyat-container -p 80:3000 451620995684.dkr.ecr.eu-central-1.amazonaws.com/reelfiyat-app:latest
